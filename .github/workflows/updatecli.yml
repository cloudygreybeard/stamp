name: Dependency updates

on:
  schedule:
    - cron: "0 7 * * 1" # Weekly, Monday 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  updatecli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run Updatecli
        uses: updatecli/updatecli-action@v3
        with:
          command: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
